<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Pre load content -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Handlee&display=swap" rel="stylesheet">
    <!-- Page Content -->
    <title>Mani Jalilzadeh | Product Designer at Hayola Studio</title>
    <link rel="shortcut icon" href="fav-icon.png" type="image/x-icon">
    <!-- Scripts and Styles -->
    <!-- Working on coding this project with react, so don't judge me! -->
    <style>
        ::selection{
            background-color: #ffffff07;
            color:auto;
        }
        *{
            font-family: "Bebas Neue", sans-serif;
            font-weight: 400;
            font-style: normal;
            box-sizing: border-box;
            transition: ease-in-out all .3s;
            user-select: none;
            -webkit-user-drag: none;
        }
        html,body{
            width: 100%;
            height: 100%;
            margin: 0;padding: 0;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1d2e09;
            color: #b7e242;   
            flex-direction: column;
        }
        h1{
            font-size: 12vw;
            line-height: 90%;
            text-transform: uppercase;
            width: 100%;
            text-align: center;
            & span{
                color: white;
            }
        }
        button{
            cursor: pointer;
            border: none;
            border-radius: 1vh;
            font-size: 3.2vh;
            padding: 1vw 2vh;
            background-color: #f0ffc8;
            color: #1d2e09;
            &:hover {
                background-color: #b7e242;
                box-shadow: 2px 2px 14px -3px #b7e242;
            }
        }
    
    .items{
        display: flex;
        align-items: center;
        gap: 0.2rem;
        width: 90%;
        justify-content: center;
    }
    #changeTheme{
        background-color: transparent;
        color: white;
        padding: 2em;
        &:hover{
            box-shadow: none;
            transform: scale(1.15);
        }
    }
    /* Mobile */
        @media only screen and (max-width: 528px)
        {
            .items{
                flex-direction: column;
                a,button {
                    width: 100%;
                    display: flex;
                    text-decoration: none;
                    align-items: center;
                    gap: 1rem;
                    justify-content: space-between;
                }
            }
        }
        /* Desktop */
        @media only screen and (min-width: 528px)
        {
            .items{
                flex-direction: row;
                
                a,button {
                    display: flex;
                    text-decoration: none;
                    align-items: center;
                    gap: 0.4rem;
                    justify-content: space-between;
                }
            }
        }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
</head>
<body>
    <h1>
        I'm still working on my <span>portfolio</span>... 
    </h1>
    <div class="items">
        <a href="https://instagram.com/wayofmani">
            <button type="button">
            <span class="material-symbols-outlined">blur_on</span>
                Instagram
            </button>
        </a>

        <a href="https://dribbble.com/wayofmani">
            <button type="button">
                <span class="material-symbols-outlined">
                    photo_library
                </span>
                Dribbble
            </button>
        </a>
        
        <a href="Mani Jalilzadeh Resume - 2024.pdf" download>
            <button type="button">
                <span class="material-symbols-outlined">download</span> 
                Read CV / Resume
            </button>
        </a>
    </div>
    <button id="changeTheme" type="button">
        <span class="material-symbols-outlined">contrast</span>
        Change Theme
    </button>
    <!-- <embed src="Mani Jalilzadeh Resume - 2024.pdf" width="95%" height="2000px" nocontrols/> -->
</body>
</html>
